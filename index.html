<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OnlyJoe</title>
  <link rel="icon" href="resources/fanslogo.png" type="image/png">
  <link rel="stylesheet" href="resources/style.css">
  <meta name="theme-color" content="#00aff0">
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="logo">
        <img src="resources/fanslogo.png" alt="logo" />
        <span>OnlyJoe</span>
      </div>
      <div class="search">
        <input id="search" placeholder="Search" aria-label="Search videos" />
      </div>
      <div class="actions">
        <img src="resources/joepfp.png" alt="profile" class="avatar" />
      </div>
    </header>

    <main class="main">
      <nav class="sidebar">
        <a class="nav-item active" data-view="home">Home</a>
        <a class="nav-item" data-view="about">About</a>
      </nav>

      <section class="content" id="content" role="main">
        <!-- Views rendered here -->
      </section>
    </main>

    <template id="home-view">
      <div class="feed">
        <section class="profile-header">
          <div class="pfp">
            <img src="resources/joepfp.png" alt="Joe Profile Picture">
          </div>
          <div class="info">
            <h2>Joe Esposito <span class="handle">@joeesposito</span></h2>
            <div class="sub">Subscriber count: <strong>42,340</strong></div>
          </div>
        </section>
        <div class="grid" id="grid"></div>
      </div>
    </template>

    <template id="player-view">
      <div class="player">
        <button class="back">← Back</button>
        <div class="player-inner">
          <video id="player" controls preload="metadata" playsinline></video>
          <div class="meta">
            <h1 id="title"></h1>
            <p id="description"></p>
          </div>
        </div>
      </div>
    </template>

    <template id="about-view">
      <div class="about">
        <h2>About OnlyJoe</h2>
        <p>Get videos DIRECTLY from joe which are very spicy 🔥🔥🔥🌶️🌶️🍆💦</p>
      </div>
    </template>

  </div>
  <!-- Floating subscribe button (PayPal.me) -->
  <a class="fab" href="https://www.paypal.com/paypalme/RobloxZoidYT/4.99" target="_blank" rel="noopener noreferrer" aria-label="Subscribe for $4.99 via PayPal">Subscribe</a>
  <script src="resources/app.js" type="module"></script>
</body>
</html>
